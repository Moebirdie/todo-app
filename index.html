<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
    integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css?family=Open+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
  <title>To-Do List</title>
</head>

<body>

  <header class="p-5 mb-4 border-5 border-bottom border-dark text-center">
    <h1 class="display-3">To-Do List</h1>
    <p class="lead">Stay on top of your tasks</p>
    <p id="currentDay" class="lead"></p>
  </header>

  <div class="container-lg px-5">

    <!-- Add task form -->
    <div class="row mb-4">
      <div class="col-12 col-md-8 offset-md-2">
        <div class="input-group">
          <input type="text" id="taskInput" class="form-control task-input" placeholder="Add a new task..." />
          <select id="prioritySelect" class="form-select priority-select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
          <button class="btn add-btn" id="addBtn">
            <i class="fas fa-plus" aria-hidden="true"></i> Add
          </button>
        </div>
      </div>
    </div>

    <!-- Filter buttons -->
    <div class="row mb-3">
      <div class="col-12 col-md-8 offset-md-2 text-center filter-btns">
        <button class="btn filter-btn active" data-filter="all">All</button>
        <button class="btn filter-btn" data-filter="active">Active</button>
        <button class="btn filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <!-- Task list -->
    <div class="row">
      <div class="col-12 col-md-8 offset-md-2">
        <ul id="taskList" class="list-unstyled"></ul>
        <p id="emptyMsg" class="text-center text-muted mt-4" style="display:none;">No tasks yet — add one above!</p>
      </div>
    </div>

    <!-- Footer actions -->
    <div class="row mt-3">
      <div class="col-12 col-md-8 offset-md-2 d-flex justify-content-between align-items-center">
        <span id="taskCount" class="text-muted small"></span>
        <button id="clearCompletedBtn" class="btn clear-btn">
          <i class="fas fa-trash"></i> Clear completed
        </button>
      </div>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="./assets/script.js"></script>
</body>

</html>
